name: Update aqua checksums

# Renovate が aqua.yaml の version を上げた PR で、aqua-checksums.json を自動再生成して
# 同じ PR branch に push する。actor==renovate[bot] と paths で発火を絞り、
# 人手 PR や無関係 PR では動かない。
#
# 注: この workflow は contents:write + head ref で動き、base-branch overlay を経由しない。
#     update-checksum-action は `aqua update-checksum -deep -prune` を実行し
#     (asset の download + ハッシュ計算のみで binary を実行しない)、push は内部の
#     commit-action (`github_token` 明示渡し) が担う。よって checkout の
#     persist-credentials は false で問題ない (ghalint policy 013 にも適合)。

on:
  pull_request:
    paths:
      - aqua.yaml
      - aqua-checksums.json

permissions:
  contents: read

jobs:
  update-aqua-checksums:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write          # Renovate PR の branch に push する
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.60.1
      - uses: aquaproj/update-checksum-action@c5df5a5c2a897a9b807068f062140506d092e7ac # v0.2.7
        with:
          prune: true
