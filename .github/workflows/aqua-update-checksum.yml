name: Update aqua checksums

# Renovate が aqua.yaml の version を上げた PR で、aqua-checksums.json を自動再生成して
# 同じ PR branch に push する。actor==renovate[bot] と paths で発火を絞り、
# 人手 PR や無関係 PR では動かない。
#
# 注: この workflow は contents:write + head ref で動き、base-branch overlay を経由しない。
#     update-checksum-action が「asset の download + ハッシュ計算」のみで binary を実行しない
#     ことを前提とする (TODO: 実装時に確認し、Risks/Open Questions の該当行を解消)。

on:
  pull_request:
    paths:
      - aqua.yaml
      - aqua-checksums.json

permissions:
  contents: read

jobs:
  update-aqua-checksums:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write          # Renovate PR の branch に push する
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - uses: aquaproj/aqua-installer@<full-sha> # v4.0.x
        with:
          aqua_version: v2.x.y
      - uses: aquaproj/update-checksum-action@<full-sha> # v0.x.y
        with:
          prune: true
