name: PR Validation

# PR の入口で PR title が Conventional Commits 形式かを検証する
# (squash 後の main コミット & リリースノートの1行になるため必須)。
# commit message 自体はローカル prek のみで縛る方針なので CI では検証しない。
#
# ブランチ名の Conventional Branch チェックは廃止した。
# 理由: ブランチ名は squash マージで main の履歴に残らず、リリースノートにも影響しない。
# 命名規則はあくまで運用上の目安であり、CI で必須チェックして PR をブロックするほどの
# 保護対象ではないと判断したため。命名はローカル運用/レビューでの確認に委ねる。
#
# aqua exec を伴う 5 ジョブ (gha-lint / gitleaks / cargo-deny / trivy / pnpm-audit) は
# `aqua-validate.yml` に分離している (push:main でも再実行して bump の取りこぼしを検知するため)。

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read

jobs:
  # --- PR title を Conventional Commits でチェック -----------------------------
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # release-drafter / commit-check.toml と同一の type 語彙に揃える
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # scope は任意・自由記述（中身は縛らない）
          requireScope: false
          # subject の整形ルールは課さない（最小: type 形式のみ）
          # 破壊的変更の "!" を許可
          # （subjectPattern を設定しないことで subject 文面は自由）

  # --- GitHub Actions が full commit SHA で固定されているか検証 ----------------
  # fix: "false" = 修正せず検証のみ。未固定の uses: があれば CI を失敗させる。
  pin-actions:
    name: Verify actions are SHA-pinned
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: suzuki-shunsuke/pinact-action@896d595f299e71d65b9d28349d6956abe144390a # v3.0.0
        with:
          fix: "false"

  # --- pre-commit hook の rev が full commit SHA で固定されているか検証 ----------
  pin-hooks:
    name: Verify hooks are SHA-pinned
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: bash scripts/check-hook-rev-sha.sh

  # --- aqua-checksums.json が aqua.yaml と整合しているか検証 ----------------------
  # ツールは実行せず download + ハッシュ計算のみ。よって PR head の aqua 設定を直接検証してよい
  # (base-branch overlay 不要)。aqua.yaml の version を上げたが aqua-checksums.json を更新し
  # 忘れた PR を fail させる。
  aqua-checksums:
    name: Verify aqua checksums are current
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.60.1
      # aqua v2 に --check フラグは無いので、再生成 → git diff で drift を検出する。
      - name: Verify aqua-checksums.json is up to date
        run: |
          aqua update-checksum
          git diff --exit-code aqua-checksums.json

  # --- pnpm の packageManager と aqua.yaml の version が一致しているか検証 -------
  # aqua.yaml と examples/docker-node/package.json の packageManager は別 consumer
  # に供するため両方持つが、ドリフトを許さない。
  pnpm-aqua-sync:
    name: Verify pnpm packageManager == aqua.yaml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: bash scripts/check-pnpm-aqua-sync.sh

  # --- Dockerfile / compose の検証（lint + base image の digest 固定 + compose 構文）---
  docker:
    name: Verify Docker (lint / digest-pinned / compose)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: hadolint (all Dockerfiles, recursive)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          recursive: true
      - name: Check base images are digest-pinned
        run: bash scripts/check-docker-digests.sh
      - name: Validate compose files
        run: |
          mapfile -t files < <(find . -path ./node_modules -prune -o -type f \
            \( -name 'docker-compose*.yml' -o -name 'docker-compose*.yaml' \
               -o -name 'compose.yml' -o -name 'compose.yaml' \) -print)
          if [ ${#files[@]} -eq 0 ]; then echo "no compose files"; exit 0; fi
          for f in "${files[@]}"; do echo "validating $f"; docker compose -f "$f" config -q; done
