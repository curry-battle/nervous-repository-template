name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    # autolabeler を PR title 編集にも追随させるため edited を含める。
    # （default の [opened, reopened, synchronize] だと title 編集で再ラベルされない）
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write       # draft release の作成・更新に必要
      pull-requests: write  # autolabeler のラベル付与に必要
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        with:
          config-name: release-drafter.yml
          # PR では autolabel のみ。draft release の更新は push: main 時だけに限定し、
          # PR イベントで draft が無駄に書き換わる/contents:write が発火するのを防ぐ。
          disable-releaser: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
