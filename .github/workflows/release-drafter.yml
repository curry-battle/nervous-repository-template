name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    # autolabeler を PR title 編集にも追随させるため edited を含める。
    # （default の [opened, reopened, synchronize] だと title 編集で再ラベルされない）
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write       # draft release の作成・更新に必要
      pull-requests: write  # autolabeler のラベル付与に必要
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7 # v6.4.0
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
