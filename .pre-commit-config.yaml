# prek（pre-commit 互換のフックランナー）で commit-check をローカル実行する設定。
#   - check-message : commit message を Conventional Commits で検証（commit-msg フック）
#   - check-branch  : ブランチ名を type/desc 規則で検証（pre-push フック）
# 詳細ルールは commit-check.toml を参照する。
#
# 導入:
#   prek install --hook-type pre-commit --hook-type commit-msg --hook-type pre-push
# （pre-commit を使う場合も同じ id・stages でそのまま動く）

repos:
  # Dockerfile linter（mise の hadolint バイナリを使用＝docker 不要）
  - repo: https://github.com/hadolint/hadolint
    rev: 57e1618d78fd469a92c1e584e8c9313024656623  # v2.14.0
    hooks:
      - id: hadolint

  - repo: https://github.com/commit-check/commit-check
    # rev も full commit SHA で固定（タグ改ざん耐性のため）。
    # 更新は `prek auto-update --freeze`（pre-commit を使う場合は `autoupdate --freeze`。設定ファイルは共通）。
    # dependabot は pre-commit を未サポートなので自動更新対象外（Renovate なら可）。
    rev: f02b8450cd051d69929fe4921b71722f82f0e28c  # v2.8.0
    hooks:
      - id: check-message
        stages: [commit-msg]
      - id: check-branch
        stages: [pre-push]

  # ローカル CLI hook は aqua の有無で skip 判定し、aqua があれば `aqua exec --` 経由で実行する。
  # aqua 未 bootstrap な開発機では skip メッセージのみ出力し、commit はブロックしない（CI が enforce）。
  # pinact だけは pass_filenames: true のため `"$@" -- ` 形でファイル名を tool に転送する。
  - repo: local
    hooks:
      - id: pinact
        name: pin GitHub Actions to SHA (pinact)
        entry: bash -c 'command -v aqua >/dev/null 2>&1 && exec aqua exec -- pinact run "$@" || echo "[pinact] aqua not installed; skipping (CI enforces)"' --
        language: system
        files: ^\.github/(workflows|actions)/.*\.ya?ml$
        pass_filenames: true

      # hook rev が full commit SHA で固定されているか検証（CI の pin-hooks と同一スクリプト）
      - id: check-hook-rev-sha
        name: check pre-commit hook revs are SHA-pinned
        entry: bash scripts/check-hook-rev-sha.sh
        language: system
        files: ^\.pre-commit-config\.yaml$
        pass_filenames: false

      # Dockerfile の FROM が full digest で固定されているか検証（CI の docker ジョブと同一スクリプト）
      - id: pin-docker
        name: check Dockerfile base images are digest-pinned
        entry: bash scripts/check-docker-digests.sh
        language: system
        files: (^|/)Dockerfile(\.[^/]+)?$|\.Dockerfile$
        pass_filenames: false

      # type 語彙が 4 箇所で一致しているか検証（CI の vocab-sync と同一スクリプト）
      - id: check-vocab-sync
        name: check type vocabulary is in sync
        entry: bash scripts/check-vocab-sync.sh
        language: system
        files: ^(commit-check\.toml|\.github/release-drafter\.yml|\.github/workflows/pr-validation\.yml)$
        pass_filenames: false

      # aqua.yaml の pnpm 版と examples/docker-node/package.json の packageManager が一致するか検証
      # （CI の pnpm-aqua-sync と同一スクリプト）
      - id: check-pnpm-aqua-sync
        name: check pnpm packageManager == aqua.yaml
        entry: bash scripts/check-pnpm-aqua-sync.sh
        language: system
        files: ^(aqua\.yaml|examples/docker-node/package\.json)$
        pass_filenames: false

      # workflow のセキュリティ lint（aqua の ghalint を使用。aqua 未 bootstrap 時は skip＝CI が強制）
      - id: ghalint
        name: lint workflows (ghalint)
        entry: bash -c 'command -v aqua >/dev/null 2>&1 && exec aqua exec -- ghalint run || echo "[ghalint] aqua not installed; skipping (CI enforces)"'
        language: system
        files: ^\.github/(workflows|actions)/.*\.ya?ml$
        pass_filenames: false

      # commit 前に staged 差分の secret を検出（aqua の gitleaks を使用。aqua 未 bootstrap 時は skip＝CI が強制）
      - id: gitleaks
        name: detect hardcoded secrets (gitleaks)
        entry: bash -c 'command -v aqua >/dev/null 2>&1 && exec aqua exec -- gitleaks git --pre-commit --redact --staged --verbose || echo "[gitleaks] aqua not installed; skipping (CI enforces)"'
        language: system
        pass_filenames: false
        always_run: true

      # Rust 依存を cargo-deny で監査（aqua の cargo-deny を使用。aqua 未 bootstrap 時は skip＝CI が強制）
      - id: cargo-deny
        name: audit Rust deps (cargo-deny)
        entry: bash -c 'command -v aqua >/dev/null 2>&1 && exec aqua exec -- cargo-deny --locked --manifest-path examples/docker-rust/Cargo.toml check --config examples/docker-rust/deny.toml || echo "[cargo-deny] aqua not installed; skipping (CI enforces)"'
        language: system
        files: (^|/)(Cargo\.toml|Cargo\.lock|deny\.toml)$
        pass_filenames: false

      # ファイルシステムの脆弱性 / 誤設定を trivy でスキャン（aqua の trivy を使用。aqua 未 bootstrap 時は skip＝CI が強制）
      - id: trivy
        name: scan filesystem (trivy)
        entry: bash -c 'command -v aqua >/dev/null 2>&1 && exec aqua exec -- trivy fs --scanners vuln,misconfig --severity HIGH,CRITICAL --skip-dirs node_modules,target,.git --exit-code 1 --no-progress . || echo "[trivy] aqua not installed; skipping (CI enforces)"'
        language: system
        pass_filenames: false
        always_run: true
