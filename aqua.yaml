---
# aqua managed CLI tools.
# 唯一の SoT。CI とローカル hook の双方がこの宣言から checksum 検証付きで取得する。
# 全パッケージは release-asset 型に限定する（CI で post-install スクリプトを走らせない方針）。
#
# 更新フロー:
#   1) packages[*].version を変更 (Renovate aqua manager が自動 PR を出す)
#   2) aqua update-checksum で aqua-checksums.json を再生成 (Renovate PR では update-checksum-action が代行)
#   3) PR の aqua-checksums job が --check で整合性検証
registries:
  - type: standard
    # aqua-renovate-config preset がこの annotation を検出して PR を出す (float させない)
    ref: v4.526.0 # renovate: depName=aquaproj/aqua-registry

checksum:
  enabled: true
  # checksum 不在は install を fail させる (fail-closed)。
  # 旧 mise の locked=true と同じ姿勢。
  require_checksum: true
  # CI (linux/amd64) と開発機 (darwin/arm64) のみ。
  # 値表記 (linux/amd64 の結合形か短縮形か) は aqua 公式 docs で確定する (TODO: aqua 実機で検証)。
  supported_envs:
    - linux/amd64
    - darwin/arm64

packages:
  # 注: hadolint は .pre-commit-config.yaml の remote hook (SHA-pinned rev) で取得・実行する。
  # aqua 側に置くと 2 経路で管理が分裂するため、ここからは意図的に除外する (codex#5)。
  - name: j178/prek@v0.4.4
  - name: suzuki-shunsuke/pinact@v4.1.0
  - name: suzuki-shunsuke/ghalint@v1.5.6
  - name: gitleaks/gitleaks@v8.30.1
  - name: EmbarkStudios/cargo-deny@0.19.9
  - name: aquasecurity/trivy@v0.71.2
  - name: pnpm/pnpm@v11.6.0
