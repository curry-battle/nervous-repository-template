# 開発者の手元で aqua を bootstrap するためだけに mise を使う。
# aqua 管理の CLI ツール (prek / pinact / ghalint / gitleaks / cargo-deny / trivy / pnpm の 7 ツール)
# は aqua.yaml + aqua-checksums.json に集約済み (唯一の SoT)。
# hadolint は aqua に載せず、CI は hadolint/hadolint-action、ローカルは .pre-commit-config.yaml の
# remote hook (rev SHA pin) で取得する従来経路を維持する。
#
# クイックスタート:
#   mise install   # aqua バイナリを mise.lock の checksum で検証してインストール
#   aqua install   # aqua.yaml の CLI を aqua-checksums.json の checksum で検証して取得
#   prek install --hook-type pre-commit --hook-type commit-msg --hook-type pre-push
#
# bootstrap は mise core registry の "aqua" を使用 (mise.lock 上は github:aquaproj/aqua に解決される)。

[tools]
aqua = "2.60.1"

[settings]
# bootstrap (aqua 1 本) を checksum 固定する。新規セットアップ時は
#   1) [settings] の locked を一旦コメントアウトして mise install
#   2) mise lock --platform linux-x64,macos-arm64 で mise.lock を生成
#   3) locked = true を有効化
# の順で進める (mise.lock が無い状態で locked=true だと install が落ちる)。
lockfile = true
locked = true
